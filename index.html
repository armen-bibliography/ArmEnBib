<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Library</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
<h1>Library</h1>
</header>
<section id="filters">
<div class="filter">
<label>Author</label>
<select id="f-authors" multiple></select>
</div>
<div class="filter">
<label>Editor</label>
<select id="f-editors" multiple></select>
</div>
<div class="filter">
<label>Translator</label>
<select id="f-translators" multiple></select>
</div>
<div class="filter">
<label>Language</label>
<select id="f-language" multiple></select>
</div>
<div class="filter">
<label>Place</label>
<select id="f-place" multiple></select>
</div>
<div class="filter">
<label>Type</label>
<select id="f-type" multiple></select>
</div>
<div class="filter">
<label>Tags</label>
<select id="f-tags" multiple></select>
</div>
<div class="filter">
<label>Year exact</label>
<input type="number" id="f-year-exact" placeholder="e.g. 2021">
</div>
<div class="filter">
<label>Year range</label>
<div class="range">
<input type="number" id="f-year-min" placeholder="min">
<span>–</span>
<input type="number" id="f-year-max" placeholder="max">
</div>
</div>
<div class="actions">
<button id="btn-clear">Clear filters</button>
</div>
</section>
<section id="stats">
<span id="count">0</span> items
</section>
<section id="results"></section>
<script src="app.js"></script>
</body>
</html>
