<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css?v=3">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous">
</head>
<body>
  <header>
    <img id="hero" src="armen.jpeg" alt="Header image">
    <h1>Armenian Studies Bibliography</h1>
    <h2>ArmEn Project</h2>

    <h1>Հայագիտական մատենագիտություն</h1>
    <h2>ArmEn նախագիծ</h2>
  </header>

  <section id="filters">
    <div class="filter">
      <label>Author</label>
      <input type="text" id="s-authors" placeholder="type to filter authors">
      <select id="f-authors" multiple></select>
    </div>
    <div class="filter">
      <label>Editor</label>
      <input type="text" id="s-editors" placeholder="type to filter editors">
      <select id="f-editors" multiple></select>
    </div>
    <div class="filter">
      <label>Translator</label>
      <input type="text" id="s-translators" placeholder="type to filter translators">
      <select id="f-translators" multiple></select>
    </div>
    <div class="filter">
      <label>Language</label>
      <input type="text" id="s-language" placeholder="type to filter languages">
      <select id="f-language" multiple></select>
    </div>
    <div class="filter">
      <div class="label-row">
        <label>Place</label>
        <button id="btn-toggle-map" type="button">Show map</button>
      </div>
      <input type="text" id="s-place" placeholder="type to filter places">
      <select id="f-place" multiple></select>
    </div>
    <div class="filter">
      <label>Type</label>
      <input type="text" id="s-type" placeholder="type to filter types">
      <select id="f-type" multiple></select>
    </div>
    <div class="filter">
      <label>Tags</label>
      <input type="text" id="s-tags" placeholder="type to filter tags">
      <select id="f-tags" multiple></select>
    </div>
    <div class="filter">
      <label>Year exact</label>
      <input type="number" id="f-year-exact" placeholder="e.g. 2021">
    </div>
    <div class="filter">
      <label>Year range</label>
      <div class="range">
        <input type="number" id="f-year-min" placeholder="min">
        <span>–</span>
        <input type="number" id="f-year-max" placeholder="max">
      </div>
    </div>
    <div class="actions">
      <button id="btn-clear">Clear filters</button>
    </div>
  </section>

  <section id="stats">
    <span id="count">0</span> items
  </section>

  <section id="map-panel" hidden>
    <div id="map"></div>
  </section>

  <section id="results"></section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
