<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibliography Search</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    margin:40px;
    background:#f5f5f5;
    color:#222;
}

h1{
    margin-bottom:20px;
}

.search-box{
    margin-bottom:30px;
}

input{
    width:100%;
    max-width:500px;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:8px;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.field{
    margin-bottom:5px;
}

a{
    color:blue;
}

</style>
</head>

<body>

<h1>Bibliography Database</h1>

<div class="search-box">
    <input 
        type="text" 
        id="universalSearch" 
        placeholder="Search bibliography..."
    >
</div>

<ul id="results"></ul>

<script>

let bibEntries = [];

Papa.parse('demo.csv', {

    header: true,
    download: true,
    skipEmptyLines: true,

    complete: function(results) {

        bibEntries = results.data;

        displayResults(bibEntries);
    },

    error: function(err) {

        document.getElementById('results').innerHTML =
            '<li>Error loading demo.csv</li>';

        console.error(err);
    }
});

document
.getElementById('universalSearch')
.addEventListener('input', function(e){

    const q = e.target.value.toLowerCase();

    const filtered = bibEntries.filter(entry => {

        return Object.values(entry)
            .join(' ')
            .toLowerCase()
            .includes(q);
    });

    displayResults(filtered);
});

function displayResults(entries){

    const results = document.getElementById('results');

    results.innerHTML = '';

    if(entries.length === 0){

        results.innerHTML = '<li>No results found.</li>';
        return;
    }

    entries.forEach(entry => {

        const li = document.createElement('li');

        li.innerHTML = `

            <div class="title">
                ${entry.Title || 'Untitled'}
            </div>

            <div class="field">
                <strong>Author:</strong>
                ${entry.Author || ''}
            </div>

            <div class="field">
                <strong>Publisher:</strong>
                ${entry.Publisher || ''}
            </div>

            <div class="field">
                <strong>Year:</strong>
                ${entry['Publication Year'] || ''}
            </div>

            <div class="field">
                <strong>Language:</strong>
                ${entry.Language || ''}
            </div>

            ${
                entry.Url
                ? `
                <div class="field">
                    <strong>URL:</strong>
                    <a href="${entry.Url}" target="_blank">
                        ${entry.Url}
                    </a>
                </div>
                `
                : ''
            }

        `;

        results.appendChild(li);
    });
}

</script>

</body>
</html>
